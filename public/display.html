<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdleScreens Pro Display</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="display-stage">
    <div id="emergencyOverlay"></div>
    <div class="brand-bar" id="brandBar"></div>
    <div class="display-frame">
      <div class="widget" id="widgetRoot"></div>
    </div>
    <div class="ticker"><span id="tickerText">Loading…</span></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.mjs" type="module"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.worker.min.mjs';
    window.pdfjsLib = pdfjsLib;
  </script>
  <script src="/display.js"></script>
</body>
</html>
